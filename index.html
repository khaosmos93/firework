<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Watch fireworks from an airplane window at night. Click anywhere to launch."
    />
    <title>Airplane View Fireworks</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000008;
        overflow: hidden;
        /* Disable pull-to-refresh and default touch gestures */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #app {
        position: fixed;
        inset: 0;
        cursor: crosshair;
      }

      /* Canvas fills the container — three.js sets pixel dimensions via setSize */
      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* Airplane-window vignette: dark oval frame */
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        background: radial-gradient(
          ellipse 78% 88% at 50% 52%,
          transparent 35%,
          rgba(0, 0, 4, 0.55) 68%,
          rgba(0, 0, 4, 0.93) 100%
        );
      }

      /* Subtle window-frame reflection lines */
      #frame {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 11;
        border: 2px solid rgba(255, 255, 255, 0.025);
        border-radius: 18% / 14%;
        margin: 4% 8%;
        box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.02);
      }

      /* Hint text — fades out after first interaction */
      #hint {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.22);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui,
          sans-serif;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
        z-index: 20;
        text-align: center;
        transition: opacity 2.5s ease;
        white-space: nowrap;
      }

      #hint.fade {
        opacity: 0;
      }

      /* WebGL error fallback */
      #error {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: rgba(255, 255, 255, 0.6);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        background: #000008;
        gap: 12px;
        z-index: 100;
      }

      #error.show {
        display: flex;
      }

      #error h2 {
        font-weight: 400;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="vignette"></div>
    <div id="frame"></div>
    <div id="hint">tap below to launch</div>
    <div id="error">
      <h2>WebGL Unavailable</h2>
      <p>Please enable WebGL or try a different browser.</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
