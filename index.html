<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Top-down fireworks simulator — watch explosions from directly above."
    />
    <title>Fireworks from Above</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000008;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #app {
        position: fixed;
        inset: 0;
        cursor: crosshair;
      }

      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* Subtle vignette — purely atmospheric, no window frame */
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        background: radial-gradient(
          ellipse 90% 90% at 50% 50%,
          transparent 50%,
          rgba(0, 0, 8, 0.45) 80%,
          rgba(0, 0, 8, 0.88) 100%
        );
      }

      /* Hint text — fades after first tap */
      #hint {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.2);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui,
          sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        pointer-events: none;
        z-index: 20;
        text-align: center;
        transition: opacity 2.5s ease;
        white-space: nowrap;
      }

      #hint.fade { opacity: 0; }

      /* WebGL error fallback */
      #error {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: rgba(255, 255, 255, 0.6);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        background: #000008;
        gap: 12px;
        z-index: 100;
      }

      #error.show { display: flex; }

      #error h2 {
        font-weight: 400;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="vignette"></div>
    <div id="hint">tap to ignite</div>
    <div id="error">
      <h2>WebGL Unavailable</h2>
      <p>Please enable WebGL or try a different browser.</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
